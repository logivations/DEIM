
train_dataloader:
  dataset:
    transforms:
      ops:  # CPU transforms (DataLoader workers)
        - {type: RandomZoomOut, fill: 0}
        - {type: RandomIoUCrop, p: 0.8}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: Resize, size: [512, 512]}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
      gpu_ops:  # GPU transforms (Kornia) - run after .to(device) ~ -10m per epoch
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: RandomHorizontalFlip, p: 0.5}
      policy:
        name: stop_epoch
        epoch: 72 # epoch in [71, ~) stop `ops`
        ops: ['Mosaic', 'RandomZoomOut', 'RandomIoUCrop']

  collate_fn:
    type: BatchImageCollateFunction
    base_size: 512
    base_size_repeat: 3
    stop_epoch: 72 # epoch in [72, ~) stop `multiscales`
    gpu_interpolate: true  # do multi-scale resize on GPU instead of CPU ~ -10m per epoch

  shuffle: True
  total_batch_size: 2 # total batch size equals to 2 (2 * 1)
  # workers auto-scale to the runner: 2/3 of available cores by default;
  # override the share with num_workers_ratio or pin exactly with num_workers
  pin_memory: True
  persistent_workers: True  # keep workers alive between epochs (no respawn stall)
  prefetch_factor: 4


val_dataloader:
  dataset:
    transforms:
      ops:
        - {type: Resize, size: [512, 512], }
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
  shuffle: False
  total_batch_size: 2
  pin_memory: True
  persistent_workers: True
  prefetch_factor: 4
