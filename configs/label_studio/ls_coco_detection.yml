task: detection

# Top-level — shared with CocoDetection via __share__, resolved names→IDs, passed to criterion via solver
ignore_tags:
  # classes present here will be ignored in loss if pallets_annotated == False
  pallets_annotated: ['pallet', 'pallet_bulk', 'pallet_off_ground', 'pallet_on_forks'] 
  # vehicles_annotated: ['amr', 'forklift', ...]  # ussage

suppress_classes:
  # in pallet_bulk area we suppress ['pallet', 'pallet_off_ground']
  pallet_bulk: ['pallet', 'pallet_off_ground']

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', ]

num_classes: 0
remap_mscoco_category: False

train_dataloader: 
  type: DataLoader
  dataset: 
    type: CocoDetection
    img_folder: /dataset/images
    ann_file: /dataset/annotations/train_coco_annotations.json
    return_masks: False
    # decode JPEGs directly at reduced size (1/2, 1/4 or 1/8 - whichever keeps
    # both sides >= presize_res); bboxes are rescaled to match. For 5MP sources
    # and 512 training res, 768 keeps a ~1.5x quality margin for augmentations.
    presize_res: 768
    transforms:
      type: Compose
      ops: ~
  shuffle: True
  drop_last: True 
  collate_fn:
    type: BatchImageCollateFunction


val_dataloader:
  type: DataLoader
  dataset: 
    type: CocoDetection
    img_folder: /dataset/images
    ann_file: /dataset/annotations/val_coco_annotations.json
    return_masks: False
    presize_res: 768
    transforms:
      type: Compose
      ops: ~ 
  shuffle: False
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction