print_freq: 100
output_dir: './logs'
checkpoint_freq: 12

# Accurate per-stage profiling: inserts torch.cuda.synchronize() before every
# stage timer in train_one_epoch. Small overhead, truthful attribution.
# Enable per run with: -u profile_sync=True
profile_sync: False

# TF32 matmul/conv on Ampere+ GPUs and cuDNN conv autotuning.
allow_tf32: True
cudnn_benchmark: True

# Per-step NaN/Inf check on pred_boxes (forces a GPU sync each step, saves
# NaN.pth on trigger). Re-enable for debugging with: -u debug_nan=True
debug_nan: False


sync_bn: True
find_unused_parameters: False


use_amp: False
scaler:
  type: GradScaler
  enabled: True


use_ema: False
ema:
  type: ModelEMA
  decay: 0.9999
  warmups: 1000
